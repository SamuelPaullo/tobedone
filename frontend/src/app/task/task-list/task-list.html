<section class="task-list">

    @if (tasks().length === 0) {
    <p>Nenhuma tarefa cadastrada ainda.</p>
    } @else {

    @for (task of tasks(); track task.id) {
    <task-list-item [task]="task" (onTitleUpdated)="handleTitleUpdated($event)"
        (onToggleTaskCompletion)="handleToggleTaskCompletion($event)" (onArchiveTask)="handleArchiveTask($event)" />
    }

    }
</section>
