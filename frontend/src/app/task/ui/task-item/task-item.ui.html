<div class="task-item">
  <mat-checkbox [checked]="task().completed" (change)="toggleCompleted()" />
  @if (isEditing()) {
    <input
      #titleInput
      class="task-title-input"
      [value]="task().title"
      (blur)="handleTitleInputBlur()"
      (keydown)="handleTitleInputKeydown($event)"
      placeholder="Título da tarefa"
    />
  } @else {
    <span class="task-title" (dblclick)="startEditing()">{{ task().title }}</span>
  }
  <button matIconButton [matMenuTriggerFor]="menu" class="task-menu" aria-label="Mais opções">
    <mat-icon class="task-menu-icon">more_vert</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="startEditing()">
      <mat-icon>edit</mat-icon>
      <span>Renomear</span>
    </button>
    <button mat-menu-item (click)="toggleCompleted()">
      <mat-icon>{{ task().completed ? 'radio_button_unchecked' : 'check_circle' }}</mat-icon>
      <span>{{ task().completed ? 'Desmarcar como concluído' : 'Marcar como concluído' }}</span>
    </button>
    <button mat-menu-item (click)="archive()">
      <mat-icon>archive</mat-icon>
      <span>Arquivar</span>
    </button>
  </mat-menu>
</div>
